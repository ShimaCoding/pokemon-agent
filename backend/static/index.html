<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon MCP Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for trace panel */
    .trace-scroll::-webkit-scrollbar { width: 4px; }
    .trace-scroll::-webkit-scrollbar-track { background: transparent; }
    .trace-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }

    /* Smooth appear animation for trace cards */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { animation: fadeSlideIn 0.2s ease-out forwards; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    /* Typing indicator dots */
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-4px); }
    }
    .dot { animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

  <!-- ===== HEADER ===== -->
  <header class="bg-gray-800 border-b border-gray-700 px-4 py-3 flex items-center gap-4 flex-wrap">
    <div class="flex items-center gap-2">
      <span class="text-2xl">⚡</span>
      <h1 class="text-lg font-bold text-yellow-400 whitespace-nowrap">Pokémon MCP Agent</h1>
    </div>

    <div class="flex items-center gap-2 ml-auto">
      <label for="providerSelect" class="text-xs text-gray-400 whitespace-nowrap">Proveedor:</label>
      <select
        id="providerSelect"
        class="bg-gray-700 border border-gray-600 text-sm rounded px-2 py-1 text-gray-100 focus:outline-none focus:ring-1 focus:ring-yellow-500"
      >
        <option value="">Cargando…</option>
      </select>
      <span id="statusBadge" class="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-400 whitespace-nowrap">
        Listo
      </span>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="flex flex-1 overflow-hidden flex-col md:flex-row">

    <!-- ===== CHAT PANEL (60%) ===== -->
    <section class="flex flex-col md:w-3/5 border-b md:border-b-0 md:border-r border-gray-700 overflow-hidden">

      <!-- Message history -->
      <div id="chatHistory" class="flex-1 overflow-y-auto p-4 space-y-3 trace-scroll">
        <!-- Initial welcome message -->
        <div class="flex justify-start">
          <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-prose text-sm text-gray-200">
            ¡Hola! Soy tu asistente Pokémon. Puedo consultar estadísticas, tipos, efectividades y más usando herramientas en tiempo real. ¿En qué te puedo ayudar?
          </div>
        </div>
      </div>

      <!-- Thinking indicator -->
      <div id="thinkingIndicator" class="hidden px-4 pb-2">
        <div class="flex items-center gap-1 text-gray-400 text-xs">
          <div class="dot w-1.5 h-1.5 rounded-full bg-yellow-400"></div>
          <div class="dot w-1.5 h-1.5 rounded-full bg-yellow-400"></div>
          <div class="dot w-1.5 h-1.5 rounded-full bg-yellow-400"></div>
          <span class="ml-1">Pensando…</span>
        </div>
      </div>

      <!-- Example chips -->
      <div class="px-4 pb-2 flex flex-wrap gap-2">
        <span class="text-xs text-gray-500">Sugerencias:</span>
        <button class="chip text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded-full transition-colors" data-query="¿Cuáles son las fortalezas y debilidades de Charizard?">Fortalezas de Charizard</button>
        <button class="chip text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded-full transition-colors" data-query="Compara a Blastoise vs Venusaur en batalla">Blastoise vs Venusaur</button>
        <button class="chip text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded-full transition-colors" data-query="¿Qué tipo es más efectivo contra Mewtwo?">Contra Mewtwo</button>
        <button class="chip text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded-full transition-colors" data-query="Analiza las estadísticas de Pikachu">Stats de Pikachu</button>
      </div>

      <!-- Input row -->
      <div class="px-4 pb-4 flex gap-2">
        <textarea
          id="queryInput"
          rows="1"
          placeholder="Pregunta sobre Pokémon…"
          class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-3 py-2 text-sm resize-none focus:outline-none focus:ring-1 focus:ring-yellow-500 placeholder-gray-500"
          style="max-height:120px; overflow-y:auto;"
        ></textarea>
        <button
          id="sendBtn"
          class="bg-yellow-500 hover:bg-yellow-400 disabled:opacity-40 disabled:cursor-not-allowed text-gray-900 font-semibold text-sm px-4 py-2 rounded-xl transition-colors flex-shrink-0"
        >
          Enviar
        </button>
      </div>
    </section>

    <!-- ===== TOOL TRACE PANEL (40%) ===== -->
    <section class="flex flex-col md:w-2/5 overflow-hidden">
      <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-300">Traza de Herramientas</h2>
        <span id="toolCountBadge" class="text-xs text-gray-500"></span>
      </div>
      <div id="tracePanel" class="flex-1 overflow-y-auto p-3 space-y-3 trace-scroll">
        <!-- Initial empty state -->
        <p id="traceEmpty" class="text-xs text-gray-500 text-center pt-8">
          Ejecuta una consulta para ver la traza
        </p>
      </div>
    </section>

  </main>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
  (() => {
    'use strict';

    // ── DOM refs ──────────────────────────────────────────────────────────
    const chatHistory      = document.getElementById('chatHistory');
    const queryInput       = document.getElementById('queryInput');
    const sendBtn          = document.getElementById('sendBtn');
    const tracePanel       = document.getElementById('tracePanel');
    const traceEmpty       = document.getElementById('traceEmpty');
    const thinkingIndicator= document.getElementById('thinkingIndicator');
    const providerSelect   = document.getElementById('providerSelect');
    const statusBadge      = document.getElementById('statusBadge');
    const toolCountBadge   = document.getElementById('toolCountBadge');

    let inFlight = false;
    let currentAssistantEl = null;  // streaming text target
    let toolCallCount = 0;

    // ── Provider dropdown ─────────────────────────────────────────────────
    async function loadProviders() {
      try {
        const res = await fetch('/providers');
        const providers = await res.json();
        const available = providers.filter(p => p.available);

        providerSelect.innerHTML = '';
        if (available.length === 0) {
          providerSelect.innerHTML = '<option value="">Sin proveedores</option>';
          return;
        }
        for (const p of available) {
          const opt = document.createElement('option');
          opt.value = p.name;
          opt.textContent = p.label;
          providerSelect.appendChild(opt);
        }
      } catch (e) {
        providerSelect.innerHTML = '<option value="">Error al cargar</option>';
      }
    }

    // ── Chat helpers ──────────────────────────────────────────────────────
    function appendUserMessage(text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'flex justify-end';
      const bubble = document.createElement('div');
      bubble.className = 'bg-yellow-600 text-gray-900 rounded-2xl rounded-tr-sm px-4 py-2 max-w-prose text-sm whitespace-pre-wrap break-words';
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      chatHistory.appendChild(wrapper);
      scrollChat();
    }

    function createAssistantBubble() {
      const wrapper = document.createElement('div');
      wrapper.className = 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = 'bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-prose text-sm text-gray-200 whitespace-pre-wrap break-words';
      wrapper.appendChild(bubble);
      chatHistory.appendChild(wrapper);
      scrollChat();
      return bubble;
    }

    function appendErrorMessage(msg) {
      const wrapper = document.createElement('div');
      wrapper.className = 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = 'bg-red-900 border border-red-700 rounded-2xl rounded-tl-sm px-4 py-2 max-w-prose text-sm text-red-200';
      bubble.textContent = `⚠️ Error: ${msg}. Intenta de nuevo o cambia el proveedor.`;
      wrapper.appendChild(bubble);
      chatHistory.appendChild(wrapper);
      scrollChat();
    }

    function scrollChat() {
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    // ── Trace helpers ─────────────────────────────────────────────────────
    const TOOL_COLORS = {
      get_pokemon_info:       'text-blue-400',
      search_pokemon:         'text-purple-400',
      get_type_effectiveness: 'text-green-400',
      analyze_pokemon_stats:  'text-orange-400',
    };

    function getToolColor(name) {
      return TOOL_COLORS[name] || 'text-yellow-400';
    }

    function clearTrace() {
      tracePanel.innerHTML = '';
      toolCallCount = 0;
      toolCountBadge.textContent = '';
      traceEmpty.textContent = 'Esperando herramientas…';
      traceEmpty.className = 'text-xs text-gray-500 text-center pt-8';
      tracePanel.appendChild(traceEmpty);
    }

    function createTraceCard(index, toolName, timestampMs) {
      // Remove empty state
      if (traceEmpty.parentNode === tracePanel) {
        tracePanel.removeChild(traceEmpty);
      }

      const card = document.createElement('div');
      card.id = `trace-card-${index}`;
      card.className = 'card-enter bg-gray-800 border border-gray-700 rounded-lg p-3 text-xs space-y-2';

      // Header row
      const header = document.createElement('div');
      header.className = 'flex items-center justify-between gap-2';

      const nameEl = document.createElement('span');
      nameEl.className = `font-bold ${getToolColor(toolName)}`;
      nameEl.textContent = toolName;

      const tsEl = document.createElement('span');
      tsEl.className = 'text-gray-500 font-mono flex-shrink-0';
      tsEl.textContent = `+${timestampMs}ms`;

      header.appendChild(nameEl);
      header.appendChild(tsEl);
      card.appendChild(header);

      // Args section (placeholder until filled)
      const argsLabel = document.createElement('div');
      argsLabel.className = 'text-gray-500 uppercase tracking-wider text-[10px]';
      argsLabel.textContent = 'Argumentos';
      card.appendChild(argsLabel);

      return card;
    }

    function fillTraceCardArgs(card, args) {
      const pre = document.createElement('pre');
      pre.className = 'bg-gray-900 rounded p-2 overflow-x-auto text-gray-300 leading-relaxed';
      pre.style.maxHeight = '120px';
      pre.textContent = JSON.stringify(args, null, 2);
      card.appendChild(pre);
    }

    function addTraceCard(index, toolName, args, timestampMs) {
      const card = createTraceCard(index, toolName, timestampMs);

      // Spinner while waiting for result
      const spinnerRow = document.createElement('div');
      spinnerRow.id = `trace-spinner-${index}`;
      spinnerRow.className = 'flex items-center gap-1 text-gray-500';
      const spinnerIcon = document.createElement('div');
      spinnerIcon.className = 'spinner w-3 h-3 border-2 border-gray-600 border-t-yellow-400 rounded-full';
      spinnerRow.appendChild(spinnerIcon);
      spinnerRow.appendChild(Object.assign(document.createElement('span'), { textContent: 'Esperando resultado…' }));
      card.appendChild(spinnerRow);

      fillTraceCardArgs(card, args);
      tracePanel.appendChild(card);
      tracePanel.scrollTop = tracePanel.scrollHeight;

      toolCallCount++;
      toolCountBadge.textContent = `${toolCallCount} llamada${toolCallCount !== 1 ? 's' : ''}`;
    }

    function fillTraceResult(index, result, timestampMs) {
      const card = document.getElementById(`trace-card-${index}`);
      if (!card) return;

      // Remove spinner
      const spinner = document.getElementById(`trace-spinner-${index}`);
      if (spinner) spinner.remove();

      const resultLabel = document.createElement('div');
      resultLabel.className = 'text-gray-500 uppercase tracking-wider text-[10px]';
      resultLabel.textContent = 'Resultado';
      card.appendChild(resultLabel);

      const pre = document.createElement('pre');
      pre.className = 'bg-gray-900 rounded p-2 overflow-y-auto text-gray-300 leading-relaxed';
      pre.style.maxHeight = '200px';
      pre.textContent = result;
      card.appendChild(pre);

      const tsEl = document.createElement('div');
      tsEl.className = 'text-gray-600 text-right';
      tsEl.textContent = `completado en +${timestampMs}ms`;
      card.appendChild(tsEl);

      tracePanel.scrollTop = tracePanel.scrollHeight;
    }

    // ── SSE consumer ──────────────────────────────────────────────────────
    async function runQuery(query) {
      if (inFlight) return;
      inFlight = true;

      setUIState('loading');
      appendUserMessage(query);
      clearTrace();
      currentAssistantEl = null;

      const provider = providerSelect.value || null;

      let reader;
      try {
        const res = await fetch('/api/agent/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, provider }),
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }

        reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          // SSE frames are separated by \n\n; extract complete frames
          const frames = buffer.split('\n\n');
          buffer = frames.pop(); // last element may be incomplete

          for (const frame of frames) {
            const line = frame.trim();
            if (!line.startsWith('data:')) continue;
            const jsonStr = line.slice('data:'.length).trim();
            if (!jsonStr) continue;

            let evt;
            try { evt = JSON.parse(jsonStr); } catch { continue; }

            handleEvent(evt);
          }
        }
      } catch (err) {
        appendErrorMessage(err.message || 'Conexión fallida');
        if (reader) try { reader.cancel(); } catch {}
      } finally {
        inFlight = false;
        setUIState('idle');
      }
    }

    function handleEvent(evt) {
      switch (evt.type) {
        case 'start':
          setStatus(`${evt.provider}`, 'active');
          break;

        case 'tool_call':
          thinkingIndicator.classList.add('hidden');
          addTraceCard(evt.index, evt.tool, evt.args, evt.timestamp_ms);
          break;

        case 'tool_result':
          fillTraceResult(evt.index, evt.result, evt.timestamp_ms);
          break;

        case 'text':
          if (!currentAssistantEl) {
            thinkingIndicator.classList.add('hidden');
            currentAssistantEl = createAssistantBubble();
          }
          currentAssistantEl.textContent += evt.delta;
          scrollChat();
          break;

        case 'done':
          setStatus('Listo', 'idle');
          if (!currentAssistantEl) {
            // Agent responded with only tool calls and no text — show summary
            currentAssistantEl = createAssistantBubble();
            currentAssistantEl.textContent = `✅ Completado (${evt.total_tool_calls} herramienta${evt.total_tool_calls !== 1 ? 's' : ''} usada${evt.total_tool_calls !== 1 ? 's' : ''})`;
          }
          if (evt.total_tool_calls === 0) {
            traceEmpty.textContent = 'No se usaron herramientas para esta consulta';
            tracePanel.appendChild(traceEmpty);
          }
          break;

        case 'error':
          appendErrorMessage(evt.message);
          setStatus('Error', 'error');
          break;
      }
    }

    // ── UI state helpers ──────────────────────────────────────────────────
    function setUIState(state) {
      const loading = state === 'loading';
      queryInput.disabled = loading;
      sendBtn.disabled = loading;
      providerSelect.disabled = loading;
      if (loading) {
        thinkingIndicator.classList.remove('hidden');
        sendBtn.textContent = '…';
      } else {
        thinkingIndicator.classList.add('hidden');
        sendBtn.textContent = 'Enviar';
      }
    }

    function setStatus(text, mode) {
      statusBadge.textContent = text;
      statusBadge.className = 'text-xs px-2 py-0.5 rounded-full whitespace-nowrap';
      if (mode === 'active') {
        statusBadge.classList.add('bg-green-800', 'text-green-300');
      } else if (mode === 'error') {
        statusBadge.classList.add('bg-red-900', 'text-red-300');
      } else {
        statusBadge.classList.add('bg-gray-700', 'text-gray-400');
      }
    }

    // ── Auto-resize textarea ──────────────────────────────────────────────
    queryInput.addEventListener('input', () => {
      queryInput.style.height = 'auto';
      queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
    });

    // ── Enter to send (Shift+Enter for newline) ───────────────────────────
    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitQuery();
      }
    });

    // ── Send button ───────────────────────────────────────────────────────
    sendBtn.addEventListener('click', submitQuery);

    function submitQuery() {
      const q = queryInput.value.trim();
      if (!q || inFlight) return;
      queryInput.value = '';
      queryInput.style.height = 'auto';
      runQuery(q);
    }

    // ── Example chips ─────────────────────────────────────────────────────
    document.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const q = btn.dataset.query;
        if (!q || inFlight) return;
        runQuery(q);
      });
    });

    // ── Init ──────────────────────────────────────────────────────────────
    loadProviders();
    queryInput.focus();
  })();
  </script>
</body>
</html>
