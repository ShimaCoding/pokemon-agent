<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Device body -->
  <rect x="10" y="2" width="44" height="58" rx="7" fill="#CC2222"/>
  <!-- Body highlight strip -->
  <rect x="10" y="2" width="18" height="58" rx="7" fill="#DD4444" opacity="0.25"/>

  <!-- Screen bezel -->
  <rect x="13" y="6" width="38" height="24" rx="3" fill="#1A1A30"/>

  <!-- Blue screen lens -->
  <circle cx="26" cy="18" r="9" fill="#1A6FAA"/>
  <circle cx="26" cy="18" r="9" fill="#2288CC" opacity="0.8"/>
  <!-- Lens glare -->
  <ellipse cx="22.5" cy="14" rx="3.5" ry="2.5" fill="white" opacity="0.55"/>

  <!-- Diamond buttons -->
  <!-- Red -->
  <polygon points="39,9 43,13 39,17 35,13" fill="#EE2222"/>
  <!-- Yellow -->
  <polygon points="45,9 49,13 45,17 41,13" fill="#F5C30A"/>
  <!-- Green -->
  <polygon points="42,16 46,20 42,24 38,20" fill="#33BB44"/>

  <!-- D-pad horizontal -->
  <rect x="16" y="35" width="14" height="5" rx="1.5" fill="#1A1A1A"/>
  <!-- D-pad vertical -->
  <rect x="20" y="31" width="5" height="13" rx="1.5" fill="#1A1A1A"/>

  <!-- A/B buttons -->
  <ellipse cx="42" cy="38" rx="4" ry="2.8" fill="#D4AA00"/>
  <ellipse cx="51" cy="38" rx="4" ry="2.8" fill="#D4AA00"/>

  <!-- Select / Start -->
  <rect x="23" y="47" width="6" height="2.5" rx="1" fill="#AA1111"/>
  <rect x="33" y="47" width="6" height="2.5" rx="1" fill="#AA1111"/>

  <!-- Speaker grille dots -->
  <circle cx="40" cy="53" r="1.2" fill="#AA1111"/>
  <circle cx="44" cy="53" r="1.2" fill="#AA1111"/>
  <circle cx="48" cy="53" r="1.2" fill="#AA1111"/>
  <circle cx="52" cy="53" r="1.2" fill="#AA1111"/>
  <circle cx="40" cy="57" r="1.2" fill="#AA1111"/>
  <circle cx="44" cy="57" r="1.2" fill="#AA1111"/>
  <circle cx="48" cy="57" r="1.2" fill="#AA1111"/>
  <circle cx="52" cy="57" r="1.2" fill="#AA1111"/>
</svg>
