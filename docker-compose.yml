services:
  pokemon-agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    volumes:
      - pokemon_data:/app/data

    networks:
      - dokploy-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcpokedex.rule=Host(`mcpokedex.shimadev.xyz`)"
      - "traefik.http.routers.mcpokedex.entrypoints=websecure"
      - "traefik.http.routers.mcpokedex.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcpokedex.loadbalancer.server.port=8000"

networks:
  dokploy-network:
    external: true

volumes:
  pokemon_data:
