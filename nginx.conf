server {
    listen 80;
    server_name mcpokedex.com www.mcpokedex.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcpokedex.com www.mcpokedex.com;

    # ── SSL certificates (managed by certbot / Let's Encrypt) ──────────────
    ssl_certificate     /etc/letsencrypt/live/mcpokedex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcpokedex.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy to the Docker container (docker-compose maps 8000 → 8002) ────
    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;

        # Standard proxy headers so the app sees the real client IP
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── SSE / streaming support ─────────────────────────────────────────
        # Keep connections open long enough for agent responses (up to 5 min).
        proxy_read_timeout         300s;
        proxy_connect_timeout      10s;
        proxy_send_timeout         300s;

        # Disable nginx response buffering so SSE frames reach the browser
        # immediately. The app also sends X-Accel-Buffering: no per-response.
        proxy_buffering            off;
        proxy_cache                off;

        # Required for SSE: prevent nginx from closing the connection early
        proxy_set_header           Connection "";
    }
}
